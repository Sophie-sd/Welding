{% load static %}
<section class="section">
  <div class="container page-hero">
    <div class="page-hero__lead reveal">
      {% if eyebrow %}<p class="eyebrow eyebrow--bar">{{ eyebrow }}</p>{% endif %}
      <h1 class="heading-display">{{ title }}</h1>
      {% if lead %}<p class="prose">{{ lead }}</p>{% endif %}
      {% if show_cta %}
      <div class="page-hero__actions">
        <a href="{% if cta_url %}{{ cta_url }}{% else %}{% url 'contact' %}{% endif %}" class="btn btn--primary"{% if not cta_url %} data-quote-open{% if cta_service %} data-service="{{ cta_service }}"{% endif %}{% endif %}>{{ cta_label|default:"Request a Quote" }}</a>
      </div>
      {% endif %}
      {% if show_trust %}
      <ul class="page-hero__trust" aria-label="Certifications">
        <li>AWS D1.1</li>
        <li>ISO 9001</li>
        <li>UK-wide</li>
      </ul>
      {% endif %}
    </div>
    {% if image %}
    <figure class="page-hero__image reveal">
      <img src="{% static image %}" alt="{{ image_alt }}" width="800" height="600"{% if preload %} fetchpriority="high"{% else %} loading="lazy"{% endif %}>
    </figure>
    {% endif %}
  </div>
</section>
